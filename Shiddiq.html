<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <title>POS Modern + QR Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6"><h1 class="text-3xl font-bold mb-6 text-center">💳 POS Modern</h1><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">  <!-- Produk -->  <div class="bg-white p-5 rounded-2xl shadow-lg">
    <h2 class="font-semibold text-lg mb-3">📦 Produk</h2>
    <input id="name" placeholder="Nama Produk" class="border rounded-lg p-2 w-full mb-2">
    <input id="price" placeholder="Harga" type="number" class="border rounded-lg p-2 w-full mb-2">
    <button onclick="addProduct()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg">Tambah</button><ul id="productList" class="mt-4 text-sm space-y-1"></ul>

  </div>  <!-- Transaksi -->  <div class="bg-white p-5 rounded-2xl shadow-lg">
    <h2 class="font-semibold text-lg mb-3">🛒 Transaksi</h2>
    <select id="productSelect" class="border rounded-lg p-2 w-full mb-2"></select>
    <button onclick="addToCart()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">Tambah</button><ul id="cart" class="mt-4 text-sm space-y-1"></ul>
<p class="mt-3 font-bold text-lg">Total: Rp <span id="total">0</span></p>

  </div>  <!-- Cash -->  <div class="bg-white p-5 rounded-2xl shadow-lg">
    <h2 class="font-semibold text-lg mb-3">💵 Cash</h2>
    <input id="pay" type="number" placeholder="Uang Bayar" class="border rounded-lg p-2 w-full mb-2">
    <button onclick="payNow()" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg">Bayar</button>
    <p class="mt-3 text-lg">Kembalian: <span class="font-bold">Rp <span id="change">0</span></span></p>
  </div>  <!-- QR -->  <div class="bg-white p-5 rounded-2xl shadow-lg text-center">
    <h2 class="font-semibold text-lg mb-3">📱 QR Payment</h2>
    <div id="qrcode" class="flex justify-center mb-3"></div>
    <button onclick="generateQR()" class="w-full bg-black hover:bg-gray-800 text-white py-2 rounded-lg">Generate QR</button>
    <button onclick="confirmQR()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg mt-2">Konfirmasi</button>
    <p id="qrStatus" class="mt-2 text-sm text-gray-600"></p>
  </div></div><script>
let products = [];
let cart = [];

function addProduct() {
  const name = document.getElementById('name').value;
  const price = parseInt(document.getElementById('price').value);

  if (!name || !price) return alert('Isi semua data');

  products.push({ name, price });
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('productList');
  const select = document.getElementById('productSelect');

  list.innerHTML = '';
  select.innerHTML = '';

  products.forEach((p, i) => {
    list.innerHTML += `<li class="flex justify-between border-b pb-1"><span>${p.name}</span><span>Rp ${p.price}</span></li>`;
    select.innerHTML += `<option value="${i}">${p.name}</option>`;
  });
}

function addToCart() {
  const index = document.getElementById('productSelect').value;
  cart.push(products[index]);
  renderCart();
}

function renderCart() {
  const list = document.getElementById('cart');
  const totalEl = document.getElementById('total');

  list.innerHTML = '';
  let total = 0;

  cart.forEach(p => {
    list.innerHTML += `<li class="flex justify-between border-b pb-1"><span>${p.name}</span><span>Rp ${p.price}</span></li>`;
    total += p.price;
  });

  totalEl.innerText = total;
}

function payNow() {
  const total = parseInt(document.getElementById('total').innerText);
  const pay = parseInt(document.getElementById('pay').value);

  if (pay < total) return alert('Uang kurang');

  document.getElementById('change').innerText = pay - total;
  cart = [];
  renderCart();
}

function generateQR() {
  const total = document.getElementById('total').innerText;
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';

  new QRCode(qrDiv, {
    text: `TOTAL:${total}`,
    width: 140,
    height: 140
  });

  document.getElementById('qrStatus').innerText = 'Scan untuk bayar';
}

function confirmQR() {
  if (cart.length === 0) return alert('Keranjang kosong');

  document.getElementById('qrStatus').innerText = 'Pembayaran berhasil';
  cart = [];
  renderCart();
  document.getElementById('qrcode').innerHTML = '';
}
</script></body>
</html>
